<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Play the List</title>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;400;700&display=swap" rel="stylesheet">


    </head>
    <body>
        <nav id="titleBar">
            <h1>Play the List</h1>
        </nav>
        <div class="container">
            <div class="sideBar">
                <div class="sidebarTitle"><h4>Library</h4></div>
                <div class="sidebarContent"></div>
            </div>
            <main class="main">
                <h2>JAMATKEV 3000</h2>
                <div class="ipod">
                    <div class="screen">
                        <h5>Now Playing</h5>
                    </div>
                    <div class="wheel">
                        <button class="wheelButton menuBtn">MENU</button>
                        <button class="wheelButton skipBtn">
                            <img src="../resources/images/skip-button.png"  aria-label="Skip song">
                        </button>
                        <button class="wheelButton prevBtn">
                            <img src="../resources/images/backward.png"  aria-label="Go back to previous song">
                        </button>
                        <button class="wheelButton playBtn">
                            <img src="../resources/images/pause-play.png" aria-label="Play or Pause">
                        </button>


                        <div class="innerWheel"></div>

                    </div>
                </div>
            </main>
        </div>
        <script src="app.js"></script>
    </body>
</html>
